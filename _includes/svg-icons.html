<div class="footer-icons">
    {% if site.footer-links.email %}
    <a href="mailto:{{ site.footer-links.email }}"><i class="svg-icon email"></i></a>
    {% endif %}

    {% if site.footer-links.github %}
    <a href="https://github.com/{{ site.footer-links.github }}"><i class="svg-icon github"></i></a>
    {% endif %}

    {% if site.footer-links.linkedin %}
    <a href="https://www.linkedin.com/in/{{ site.footer-links.linkedin }}"><i class="svg-icon linkedin"></i></a>
    {% endif %}

    {% if site.footer-links.scholar %}
    <a href="https://scholar.google.com/citations?user={{ site.footer-links.scholar }}" title="Google Scholar">
        <span class="icon-scholar"
            style="display: inline-block; line-height: 1; vertical-align: +1px; margin-left: 4px;">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
                style="width: 21px; height: 21px; fill: #5a5a5a;">
                <path
                    d="M12 2L1 9l11 7 9-5.73V17h2V9L12 2zM5 13.33V19c0 1.1 3.13 2 7 2s7-.9 7-2v-5.67l-7 4.45-7-4.45z" />
            </svg>
        </span>
    </a>
    {% endif %}
</div>
