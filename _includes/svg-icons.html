<div class="footer-icons">
    {% if site.footer-links.email %}
    <a href="mailto:{{ site.footer-links.email }}"><span class="icon-email">{% include svg/email.svg %}</span></a>
    {% endif %}

    {% if site.footer-links.github %}
    <a href="https://github.com/{{ site.footer-links.github }}"><span class="icon-github">{% include svg/github.svg
            %}</span></a>
    {% endif %}

    {% if site.footer-links.linkedin %}
    <a href="https://www.linkedin.com/in/{{ site.footer-links.linkedin }}"><span class="icon-linkedin">{% include
            svg/linkedin.svg %}</span></a>
    {% endif %}

    {% if site.footer-links.scholar %}
    <a href="https://scholar.google.com/citations?user={{ site.footer-links.scholar }}" title="Google Scholar">
        <span class="icon-scholar">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
                style="width:20px; height:20px; fill:currentColor; vertical-align:middle;">
                <path
                    d="M12 2L1 9l11 7 9-5.73V17h2V9L12 2zM5 13.33V19c0 1.1 3.13 2 7 2s7-.9 7-2v-5.67l-7 4.45-7-4.45z" />
            </svg>
        </span>
    </a>
    {% endif %}
</div>
